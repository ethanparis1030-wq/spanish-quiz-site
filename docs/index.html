<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spanish A1 + A2 Quiz</title>
  <style>
    :root {
      --bg-1: #fff7fb;
      --bg-2: #ffeef6;
      --bg-3: #fffdfd;
      --card: rgba(255,255,255,0.82);
      --card-strong: rgba(255,255,255,0.92);
      --line: #f1c9d8;
      --text: #5d4351;
      --muted: #9c7486;
      --pink-1: #ffd9e8;
      --pink-2: #f8b7cf;
      --pink-3: #ee93b6;
      --pink-4: #d96d97;
      --rose: #d96d97;
      --ok-bg: #edf9f0;
      --ok-line: #9bd0aa;
      --bad-bg: #fff0f3;
      --bad-line: #f0a3b7;
      --tag-bg: #fff3f7;
      --tag-line: #f0c7d6;
      --shadow: 0 14px 36px rgba(230, 154, 183, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff8fc 0%, #fff2f8 28%, transparent 52%),
        radial-gradient(circle at right top, #ffeef5 0%, transparent 40%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,245,250,.90));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      color: #7a4a61;
      letter-spacing: .2px;
    }

    .sub {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 20px;
    }

    .panel, .qbox, .stat {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
    }

    .qbox {
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #7b5364;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    select, textarea, input[type="text"] {
      width: 100%;
      padding: 12px 13px;
      border-radius: 14px;
      border: 1px solid #efccda;
      background: rgba(255,255,255,.9);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    select:focus, textarea:focus, input[type="text"]:focus {
      border-color: #df97b5;
      box-shadow: 0 0 0 3px rgba(239, 169, 198, .18);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink-2), var(--pink-4));
      color: white;
      box-shadow: 0 10px 20px rgba(217,109,151,.22);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #fff7fb, #ffeef5);
      color: #8b5c72;
      border: 1px solid #efcad8;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ffe7ee, #ffd2df);
      color: #a44c6b;
      border: 1px solid #f2bfd0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 14px;
    }

    .stat .k {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat .v {
      font-size: 26px;
      font-weight: 800;
      color: #824f66;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-line);
      font-size: 12px;
      color: #8a5a71;
    }

    .prompt {
      font-size: 24px;
      line-height: 1.65;
      white-space: pre-wrap;
      margin: 10px 0 16px;
      color: #634754;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .feedback {
      margin-top: 14px;
      border-radius: 16px;
      padding: 14px;
      display: none;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .feedback.ok {
      display: block;
      background: var(--ok-bg);
      border: 1px solid var(--ok-line);
    }

    .feedback.bad {
      display: block;
      background: var(--bad-bg);
      border: 1px solid var(--bad-line);
    }

    .feedback.info {
      display: block;
      background: #fff6fa;
      border: 1px solid #f0cad8;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #f0cad8, transparent);
      margin: 14px 0;
    }

    @media (max-width: 1020px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .prompt {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Spanish A1 + A2 合并刷题站</h1>
      <div class="sub">
        这版已经按你要的结构改成：<b>Level → 板块 → Batch</b>。<br>
        默认模式下，<b>答对过的题不会再反复出现</b>；除非你点“重新开始当前范围”或者把“题目出现方式”切到“包含已掌握题”。
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>筛选与设置</h2>

        <div class="field">
          <label for="levelSelect">Level</label>
          <select id="levelSelect">
            <option value="ALL">全部</option>
            <option value="A1">A1</option>
            <option value="A2">A2</option>
          </select>
        </div>

        <div class="field">
          <label for="moduleSelect">板块</label>
          <select id="moduleSelect"></select>
        </div>

        <div class="field">
          <label for="batchSelect">Batch</label>
          <select id="batchSelect"></select>
        </div>

        <div class="field">
          <label for="masteryModeSelect">题目出现方式</label>
          <select id="masteryModeSelect">
            <option value="active">未做 + 错题（默认）</option>
            <option value="missed">只刷错题</option>
            <option value="all">包含已掌握题</option>
          </select>
        </div>

        <div class="field">
          <label class="small"><input type="checkbox" id="autoNext"> 答对后自动下一题</label>
        </div>

        <div class="row">
          <button id="applyBtn" class="btn-primary">应用筛选</button>
          <button id="resetFilterBtn" class="btn-secondary">重置筛选</button>
          <button id="resetCurrentScopeBtn" class="btn-secondary">重新开始当前范围</button>
        </div>

        <div class="divider"></div>

        <h2>数据与进度</h2>
        <div class="row">
          <button id="exportBtn" class="btn-secondary">导出进度</button>
          <button id="importBtn" class="btn-secondary">导入进度</button>
          <button id="resetProgressBtn" class="btn-danger">清空全部进度</button>
        </div>
        <input id="importFile" type="file" accept="application/json" class="hidden">

        <div class="divider"></div>
        <div class="small muted" id="poolInfo">题库载入中...</div>
      </div>

      <div>
        <div class="stats">
          <div class="stat"><div class="k">当前题池</div><div class="v" id="poolCount">0</div></div>
          <div class="stat"><div class="k">已作答</div><div class="v" id="answeredCount">0</div></div>
          <div class="stat"><div class="k">正确率</div><div class="v" id="accuracy">0%</div></div>
          <div class="stat"><div class="k">错题数</div><div class="v" id="missedCount">0</div></div>
        </div>

        <div class="qbox">
          <div class="meta" id="questionMeta"></div>
          <div class="prompt" id="prompt">载入中...</div>

          <div class="field">
            <label for="answerInput">你的答案</label>
            <textarea id="answerInput" placeholder="在这里输入答案。支持中文、英文、西语。"></textarea>
          </div>

          <div class="toolbar">
            <button id="submitBtn" class="btn-primary">提交</button>
            <button id="showBtn" class="btn-secondary">显示答案</button>
            <button id="nextBtn" class="btn-secondary">下一题</button>
          </div>

          <div id="feedback" class="feedback"></div>
        </div>
      </div>
    </div>
  </div>

：\nAGENCIA DE VIAJES \"EL ALA\" Viajes organizados exclusivamente para jubilados, descuentos insuperables con la tarjeta de la tercera edad. Oficina abierta de lunes a viernes de 08:00 a 18:00. Benidorm, 27 mayo – 13 junio, todo incluido, 250 € Málaga, 5 junio – 15 junio, media pensión, 160 €\n\n关键词：viajar（旅行），ancianos（老人），jubilados（退休老人），descuentos（折扣（复））", "attempts": 2}, {"id": "M1_R_T2_Q8", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t2", "section_title": "A2 阅读 - Turismo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nNo es un buen lugar para…\n\n选项：\nA. ir en coche.\nB. alojarse.\nC. visitar el centro.", "answers": ["A", "a", "ir en coche.", "A. ir en coche.", "A) ir en coche."], "explanation": "答案A。原文/录音里有与“ir en coche.”对应的信息。\n\n原文证据：\nHOTEL RAMÍREZ *** Situado en el centro de la ciudad, a pocos metros de la estatua de Colón. Un hermoso edificio histórico reconvertido para el disfrute de los turistas. Cerca de los principales monumentos, museos, bares y restaurantes. La zona no tiene aparcamiento, pero se puede llegar andando 15 minutos desde la estación. Precio: 25€/noche.\n\n关键词：coche（汽车），centro（市中心），ciudad（城市），turistas（游客）", "attempts": 2}, {"id": "M1_R_T2_Q9", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t2", "section_title": "A2 阅读 - Turismo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl anuncio dice que…\n\n选项：\nA. una persona puede acompañarte durante tu excursión.\nB. hay recuerdos gratis para todos.\nC. los clientes deben ser mayores de edad.", "answers": ["A", "a", "una persona puede acompañarte durante tu excursión.", "A. una persona puede acompañarte durante tu excursión.", "A) una persona puede acompañarte durante tu excursión."], "explanation": "答案A。原文/录音里有与“una persona puede acompañarte durante tu excursión.”对应的信息。\n\n原文证据：\nAVENTURILANDIA Organizamos excursiones para grupos escolares y de adultos. Servicio de guías turísticos para visitar los bosques de los alrededores. Deportes de riesgo, montar a caballo, alquiler de bicicletas y mucho más. Todo en un mismo lugar. Para grupos de más de 15 personas, regalo de souvenirs artesanales\n\n关键词：excursión（短途旅行），guías（导游），bosques（森林）", "attempts": 2}, {"id": "M1_R_T2_Q10", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t2", "section_title": "A2 阅读 - Turismo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEn el hostal Mercedes…\n\n选项：\nA. no podemos hacer nuestra propia comida.\nB. se paga poco por pasar la noche.\nC. hay una tienda.", "answers": ["B", "b", "se paga poco por pasar la noche.", "B. se paga poco por pasar la noche.", "B) se paga poco por pasar la noche."], "explanation": "答案B。原文/录音里有与“se paga poco por pasar la noche.”对应的信息。\n\n原文证据：\nHOSTAL MERCEDES A dos paradas de metro del centro de la ciudad, con habitaciones compartidas y una gran cocina común. La opción más económica de la ciudad, para viajar sin vaciar la cartera. Al lado de nuestro hostal hay un supermercado que está abierto 24 horas. Precio por persona: 10€/noche.\n\n关键词：hostal（旅馆），centro（市中心），ciudad（城市），habitaciones（房间）", "attempts": 2}, {"id": "M1_R_T2_Q11", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t2", "section_title": "A2 阅读 - Turismo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEn “La Gaviota”…\n\n选项：\nA. hay productos viejos y de segunda mano.\nB. se pueden comprar mascotas.\nC. podemos comprar artículos para ir a la playa.", "answers": ["C", "c", "podemos comprar artículos para ir a la playa.", "C. podemos comprar artículos para ir a la playa.", "C) podemos comprar artículos para ir a la playa."], "explanation": "答案C。原文/录音里有与“podemos comprar artículos para ir a la playa.”对应的信息。\n\n原文证据：\nLA GAVIOTA Una pequeña tienda en el corazón de la hermosa ciudad de Altea. Todo lo que el turista necesita: bañadores, gorras, sombreros, toallas, sombrillas, mochilas, etc. Somos un comercio familiar con más de 50 años de historia, atendemos al cliente siempre con una sonrisa en la cara.\n\n关键词：playa（海滩），tienda（商店），ciudad（城市），toallas（毛巾）", "attempts": 2}, {"id": "M1_R_T2_Q12", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t2", "section_title": "A2 阅读 - Turismo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEn este hotel…\n\n选项：\nA. las camas no son cómodas.\nB. se puede hacer deporte.\nC. todas las habitaciones tienen el mismo número.", "answers": ["C", "c", "todas las habitaciones tienen el mismo número.", "C. todas las habitaciones tienen el mismo número.", "C) todas las habitaciones tienen el mismo número."], "explanation": "答案C。原文/录音里有与“todas las habitaciones tienen el mismo número.”对应的信息。\n\n原文证据：\nHOTEL LEWANDOSKI Somos fans del famoso jugador polaco, en nuestro hotel todo está decorado con cuadros, fotos y pinturas del mejor jugador del mundo, nuestro ídolo, Robert Lewandowski. Todas las habitaciones tienen el número 9, las camas son rojas y blancas y en las televisiones solo se pueden ver partidos de fútbol en los que Robert marca goles. Precio: 40 €/noche.\n\n关键词：habitaciones（房间），fans（粉丝）", "attempts": 2}, {"id": "M1_R_T2_Q13", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t2", "section_title": "A2 阅读 - Turismo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl anuncio dice que…\n\n选项：\nA. dormir en tienda de campaña es más caro que en habitaciones.\nB. el camping está bien comunicado.\nC. los clientes se preocupan al dormir en tiendas de campaña.", "answers": ["B", "b", "el camping está bien comunicado.", "B. el camping está bien comunicado.", "B) el camping está bien comunicado."], "explanation": "答案B。原文/录音里有与“el camping está bien comunicado.”对应的信息。\n\n原文证据：\nCAMPING EL GORRIÓN Situado al lado de la parada de tranvía “Avenida Libertad”, a cinco minutos en coche del aeropuerto y a pocos metros de un hermoso parque. Todas nuestras habitaciones son dobles. También existe la posibilidad de dormir en tienda de campaña, en nuestra zona de acampada. En el camping “El Gorrión” el cliente disfruta al máximo, preocupándose lo mínimo. Precio por habitación: 35€/noche. Precio en tienda de campaña: 10€/persona.\n\n关键词：camping（露营地），coche（汽车），aeropuerto（机场），habitaciones（房间）", "attempts": 2}, {"id": "M1_R_T3_Q14", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m1_t3", "section_title": "A2 阅读 - Turismo - Task 3", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Turismo", "batch_key": "A2::reading::Turismo", "batch_order": 1, "prompt": "[A2 阅读 · Turismo · Task 3]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n阅读材料：\n[材料 1]\nA\n\n[材料 2]\nC\n\n[材料 3]\nB\n\n问题：\n¿Quién dice que no le gustó su viaje?\n\n选项：\nA. A. Raúl\nB. B. Ana\nC. C. Edu Y Bea", "answers": ["C", "c", "C. Edu Y Bea", "Edu Y Bea", "C. C. Edu Y Bea", "C) C. Edu Y Bea"], "explanation": "答案C（C. Edu Y Bea）。相关原文/录音见 evidence_original。\n\n原文证据：\nMi novio Edu quiso hacerme una sorpresa por mi cumpleaños y me po de fútbol de niños, son muy pequeños, tienen 3, 4 y 5 años, lo que más hacemos son juegos, nos lo pasamos muy bien juntos. El año pasado decidimos comprar un conjunto de ropa igual para todos los niños, de color azul, como el escudo del equipo, en este momento empezaron los problemas. Una madre me dijo que su hijo no podía llevar ropa de poliéster porque era alérgico, otra comentó que las camisetas eran muy feas, algunos se quejaron del precio y decían que yo ganaba dinero con esto (lo cual es mentira). Es más difícil tratar con los padres que con los hijos, finalmente decidí no cambiar nada, ahora los niños están tristes porque no tienen uniformes.\n\n关键词：gente（人们），entrenador（教练），niños（孩子们），ropa（衣服）", "attempts": 2}, {"id": "M2_R_T3_Q16", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m2_t3", "section_title": "A2 阅读 - Compras - Task 3", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Compras", "batch_key": "A2::reading::Compras", "batch_order": 2, "prompt": "[A2 阅读 · Compras · Task 3]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n阅读材料：\n[材料 1]\nA\n\n[材料 2]\nC\n\n[材料 3]\nB\n\n问题：\n¿Quién ha descubierto una forma nueva de tener ropa sin pagar?\n\n选项：\nA. A. Pepe\nB. B. Fran\nC. C. Ana", "answers": ["C", "c", "C. Ana", "Ana", "C. C. Ana", "C) C. Ana"], "explanation": "答案C（C. Ana）。相关原文/录音见 evidence_original。\n\n原文证据：\nHace unos meses descubrí una página web súper interesante, gracias a ella puedo cambiar la ropa que ya no utilizo por cosas de otras personas. La página funciona de una forma muy simple, tú pones las fotos de las cosas que ya no quieres y buscas lo que otra gente ofrece. Puedes enviar mensajes privados o poner anuncios del estilo: “Busco vestido azul para ir a una boda”. Se lo he dicho a todas mis amigas y estamos muy contentas. Mi novio lo ha probado también y ahora está todos los días buscando algo para cambiar, él está intentando ahorrar para el nuevo coche y no quiere gastar mucho en ropa. Es como comprar ropa g te anuncio…\n\n选项：\nA. se promociona una medicina.\nB. se promocionan unos nuevos productos.\nC. se habla de unos productos para hombres.", "answers": ["C", "c", "se habla de unos productos para hombres.", "C. se habla de unos productos para hombres.", "C) se habla de unos productos para hombres."], "explanation": "答案C。原文/录音里有与“se habla de unos productos para hombres.”对应的信息。\n\n原文证据：\nDOS ESPADAS Productos para afeitarse de una forma más cómoda y elegante. Gracias a nuestros excelentes productos de la más alta calidad vas a poder presumir de tener una barba y bigote elegante, o de no tenerlos, es tu decisión. La empresa cuenta con más de veinte años de experiencia en el sector. Nuestras maquinillas de afeitar no hacen daño al deslizarse por tu cara. Recuerda: Dos espadas, tu primer artículo de higiene personal.\n\n关键词：anuncio（广告），hombres（男人们/男性），poder（能够），empresa（公司）", "attempts": 2}, {"id": "M3_R_T2_Q8", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t2", "section_title": "A2 阅读 - Estudios y trabajo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nMarcelo…\n\n选项：\nA. te puede ayudar a hacer ejercicio.\nB. tiene un lobo en su gimnasio.\nC. entrena todos los días ocho horas. Soy Marcelo, pero todos me llaman “El lobo”, tu entrenador personal con 5 años de experiencia, puedo acompañarte al gimnasio y ayudarte a conseguir los mejores resultados. Una hora de entrenamiento conmigo cuesta doce euros. Trabajo de lunes a viernes, de ocho de la mañana a ocho de la noche. Solo Valencia ciudad, preferiblemente zona centro, no tengo vehículo propio.", "answers": ["A", "a", "te puede ayudar a hacer ejercicio.", "A. te puede ayudar a hacer ejercicio.", "A) te puede ayudar a hacer ejercicio."], "explanation": "答案A。原文/录音里有与“te puede ayudar a hacer ejercicio.”对应的信息。\n\n原文证据：\nMARCELO, EL LOBO\n\n关键词：ejercicio（运动）", "attempts": 2}, {"id": "M3_R_T2_Q9", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t2", "section_title": "A2 阅读 - Estudios y trabajo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl anuncio dice que…\n\n选项：\nA. puedes practicar idiomas en esta empresa.\nB. puedes estar medio año trabajando sin ganar dinero.\nC. después de seis meses los trabajadores pagan a la empresa.", "answers": ["B", "b", "puedes estar medio año trabajando sin ganar dinero.", "B. puedes estar medio año trabajando sin ganar dinero.", "B) puedes estar medio año trabajando sin ganar dinero."], "explanation": "答案B。原文/录音里有与“puedes estar medio año trabajando sin ganar dinero.”对应的信息。\n\n原文证据：\nSE BUSCA BECARIO Buscamos un estudiante para hacer prácticas en nuestra empresa durante seis meses. Es una oportunidad increíble para aprender cómo se trabaja en una gran empresa. No pagamos nada por las prácticas. Cuarenta horas a la semana, horario flexible. Si te interesa la oferta, escribe un correo electrónico a la dirección: recursoshumanos@atox.es\n\n关键词：empresa（公司）", "attempts": 2}, {"id": "M3_R_T2_Q10", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t2", "section_title": "A2 阅读 - Estudios y trabajo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl comunicado dice que…\n\n选项：\nA. los estudiantes no pueden ir a clase.\nB. unos informáticos son los culpables del virus de la web.\nC. unos profesionales ya están intentando solucionar el problema.", "answers": ["C", "c", "unos profesionales ya están intentando solucionar el problema.", "C. unos profesionales ya están intentando solucionar el problema.", "C) unos profesionales ya están intentando solucionar el problema."], "explanation": "答案C。原文/录音里有与“unos profesionales ya están intentando solucionar el problema.”对应的信息。\n\n原文证据：\nPROBLEMAS TÉCNICOS La página web del colegio no funciona, hemos tenido problemas técnicos. No sabemos que ha pasado, pero se han borrado todos los datos del curso, incluidas las notas de los estudiantes. Si algún alumno necesita información sobre sus clases puede llamar a la secretaría. Hemos contactado con una empresa de informática que ya está trabajando para arreglar la web.\n\n关键词：problema（问题），página（网页），estudiantes（学生）", "attempts": 2}, {"id": "M3_R_T2_Q11", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t2", "section_title": "A2 阅读 - Estudios y trabajo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl anuncio dice que…\n\n选项：\nA. si vendes más, ganas más dinero.\nB. te ofrecen dos mil euros por trabajar con ellos.\nC. la empresa tiene sus propios clientes.", "answers": ["A", "a", "si vendes más, ganas más dinero.", "A. si vendes más, ganas más dinero.", "A) si vendes más, ganas más dinero."], "explanation": "答案A。原文/录音里有与“si vendes más, ganas más dinero.”对应的信息。\n\n原文证据：\nOFERTA DE TRABAJO Si tienes habilidades como comercial de zapatos, escríbenos. Te damos nuestro catálogo y tú solo tienes que buscar clientes. Por cada producto vendido, tú te llevas un 20% del valor de producto. Solo trabajamos con comisiones, no ofrecemos sueldo fijo. Algunos de nuestros comerciales ya ganan más de dos mil euros al mes. No puedes dejar escapar esta oportunidad, ¡escríbenos!\n\n关键词：oferta（工作机会/报价）", "attempts": 2}, {"id": "M3_R_T2_Q12", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t2", "section_title": "A2 阅读 - Estudios y trabajo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl anuncio dice que…\n\n选项：\nA. ofrecen cursos de varias lenguas.\nB. en verano puedes ayudar a algunos profesores nativos.\nC. debes marcar el prefijo antes del número de teléfono.", "answers": ["C", "c", "debes marcar el prefijo antes del número de teléfono.", "C. debes marcar el prefijo antes del número de teléfono.", "C) debes marcar el prefijo antes del número de teléfono."], "explanation": "答案C。原文/录音里有与“debes marcar el prefijo antes del número de teléfono.”对应的信息。\n\n原文证据：\nACADEMIA ESPAÑOLA IBERIA Aprende español con nosotros, tenemos profesores nativos que te van ayudar a mejorar tu pronunciación. Disfruta de unas vacaciones en Alicante al mismo tiempo que estudias tu lengua favorita. Pídenos información sobre nuestros cursos de verano, llámanos ahora mismo a nuestra línea de atención telefónica 24h: +34 (código de España) 965426117 (número de teléfono).\n\n关键词：vacaciones（假期）", "attempts": 2}, {"id": "M3_R_T2_Q13", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t2", "section_title": "A2 阅读 - Estudios y trabajo - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nManuel Santos Segarra…\n\n选项：\nA. da clases privadas.\nB. es un adolescente amante de las matemáticas.\nC. ha empezado a trabajar como profesor hace poco tiempo.", "answers": ["A", "a", "da clases privadas.", "A. da clases privadas.", "A) da clases privadas."], "explanation": "答案A。原文/录音里有与“da clases privadas.”对应的信息。\n\n原文证据：\nPROFESOR MANUEL Mi nombre es Manuel Santos Segarra y soy profesor de la Universidad de Granada. Tengo 12 años de experiencia y he escrito dos libros para estudiantes. Ofrezco clases particulares de matemáticas para niños, adolescentes y adultos. Todos los niveles, también puedo ayudar con preparación para exámenes oficiales. Las clases tienen lugar en mi apartamento, en el barrio de San Antón. Precio: 15 euros por una hora o 20 euros por 90 minutos. Descuentos especiales para grupos de 3 o 4 personas.\n\n关键词：estudiantes（学生），niños（孩子们）", "attempts": 2}, {"id": "M3_R_T3_Q14", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m3_t3", "section_title": "A2 阅读 - Estudios y trabajo - Task 3", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Estudios y trabajo", "batch_key": "A2::reading::Estudios y trabajo", "batch_order": 3, "prompt": "[A2 阅读 · Estudios y trabajo · Task 3]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n阅读材料：\n[材料 1]\nA\n\n[材料 2]\nC\n\n[材料 3]\nB\n\n问题：\n¿Quién empezó a estudiar una cosa, pero terminó estudiando otra?.\n\n选项：\nA. A. Iván\nB. B. Sara\nC. C. Bea", "answers": ["B", "b", "B. Sara", "Sara", "B. B. Sara", "B) B. Sara"], "explanation": "答案B（B. Sara）。相关原文/录音见 evidence_original。\n\n原文证据：\nEmpecé a estudiar arte dramático cuando tenía 18 años, quería ser actriz. Al poco tiempo, descubrí que era mucho más difícil de lo que pensaba y cambié por completo de estudios. Hice la carrera de informática en tan solo tres años (normalmente, la gente necesita cinco años). Las empresas empezaron a llamarme, eran muchísimas y yo no sabía que hacer. Finalmente acepté una oferta muy interesante de una multinacional. Tuve que emigar a los Estados Unidos, fue una decisión difícil, pero creo que correcta. Ahora estoy casada y tengo un hijo de tres meses. Pienso mucho en mis padres y amigos, solo les veo una vez al año, en Navidades. Pero mi vida profesional ha sido un éxito, estoy feliz.\n\n关键词：estudiar（学习） sé genial.\n\n关键词：tarde（迟；下午）", "attempts": 2}, {"id": "M4_R_T2_Q6", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m4_t2", "section_title": "A2 阅读 - Tiempo libre - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Tiempo libre", "batch_key": "A2::reading::Tiempo libre", "batch_order": 4, "prompt": "[A2 阅读 · Tiempo libre · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nDurante las fiestas temáticas…\n\n选项：\nA. la discoteca abre antes de lo normal.\nB. hay bailarines especiales.\nC. si vas disfrazado tienes algo gratis.", "answers": ["C", "c", "si vas disfrazado tienes algo gratis.", "C. si vas disfrazado tienes algo gratis.", "C) si vas disfrazado tienes algo gratis."], "explanation": "答案C。原文/录音里有与“si vas disfrazado tienes algo gratis.”对应的信息。\n\n原文证据：\nEl próximo viernes 15 de septiembre abre sus puertas la discoteca Maravilla. Ven a disfrutar con nosotros de noches interminables de diversión en nuestras 3 salas con música diferente, conoce a cientos de personas interesantes y prueba nuestros cócteles únicos. El último fin de semana de cada mes organizamos una fiesta temática, el 30 de septiembre si vienes vestido de vampiro te invitamos a la primera bebida. Abrimos todos los viernes y sábados, de 23:00 a 06:00. Venta de entradas anticipadas en nuestra página web. DISCOTECA MARAVILLA\n\n关键词：gratis（免费），discoteca（迪厅），disfrutar（享受）", "attempts": 2}, {"id": "M4_R_T2_Q7", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m4_t2", "section_title": "A2 阅读 - Tiempo libre - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Tiempo libre", "batch_key": "A2::reading::Tiempo libre", "batch_order": 4, "prompt": "[A2 阅读 · Tiempo libre · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEn el gimnasio Esparta…\n\n选项：\nA. la gente puede pagar con su tarjeta de estudiante.\nB. una de las clases va a ser en un día diferente.\nC. buscan trabajadores para la recepción.", "answers": [ icho que ellos van a comprar la bebida para todos. Tenemos que confirmar la asistencia cuanto antes en el grupo de WhatsApp.\n\n关键词：barbacoa（烧烤）", "attempts": 2}, {"id": "M4_R_T2_Q12", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m4_t2", "section_title": "A2 阅读 - Tiempo libre - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Tiempo libre", "batch_key": "A2::reading::Tiempo libre", "batch_order": 4, "prompt": "[A2 阅读 · Tiempo libre · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEl anuncio dice que…\n\n选项：\nA. en verano puedes trabajar en este lugar.\nB. se paga diferente dependiendo de la edad del cliente.\nC. el parque de atracciones va a abrir más pronto de lo normal.", "answers": ["B", "b", "se paga diferente dependiendo de la edad del cliente.", "B. se paga diferente dependiendo de la edad del cliente.", "B) se paga diferente dependiendo de la edad del cliente."], "explanation": "答案B。原文/录音里有与“se paga diferente dependiendo de la edad del cliente.”对应的信息。\n\n原文证据：\nPARQUE DE ATRACCIONES Un lugar para pasarlo bomba en familia. Abrimos nuestras atracciones de agua para la temporada de verano, además desde junio hasta septiembre abrimos hasta las 22:30. Este año también inauguramos un nuevo restaurante de comida rápida junto a la entrada. Precio: adultos 15€, jóvenes de más de 10 años 12€, niños gratis.\n\n关键词：atracciones（游乐设施），familia（家庭），verano（夏天）", "attempts": 2}, {"id": "M4_R_T2_Q13", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m4_t2", "section_title": "A2 阅读 - Tiempo libre - Task 2", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Tiempo libre", "batch_key": "A2::reading::Tiempo libre", "batch_order": 4, "prompt": "[A2 阅读 · Tiempo libre · Task 2]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n问题：\nEn este programa…\n\n选项：\nA. van a repetir un programa que grabaron el año pasado.\nB. tienen un presentador que es un príncipe.\nC. van a hablar con el hijo del rey.", tos con unos vestidos, fue la primera vez que trabajé como modelo, pero no la última.\n\n关键词：gimnasio（健身房），novio（男朋友）", "attempts": 2}, {"id": "M4_R_T3_Q15", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m4_t3", "section_title": "A2 阅读 - Tiempo libre - Task 3", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Tiempo libre", "batch_key": "A2::reading::Tiempo libre", "batch_order": 4, "prompt": "[A2 阅读 · Tiempo libre · Task 3]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n阅读材料：\n[材料 1]\nA\n\n[材料 2]\nC\n\n[材料 3]\nB\n\n问题：\n¿Quién estaba triste porque vivía lejos de sus amigos?\n\n选项：\nA. A. Álex\nB. B. Alba\nC. C. Ígor", "answers": ["A", "a", "A. Álex", "Álex", "A. A. Álex", "A) A. Álex"], "explanation": "答案A（A. Álex）。相关原文/录音见 evidence_original。\n\n原文证据：\nNací en España, pero cuando tenía 15 años mi familia se mudó a Francia. Tenía amigos en España y en Francia, cuando estaba en España, echaba de menos a mis amigos franceses y, cuando estaba en Francia, quería ver a los españoles. Empecé a trabajar en una discoteca cuando iba a la universidad, yo vivía en el centro de París y la discoteca estaba a 80 km de mi casa, tenía que coger tres autobuses para ir, acababa muy cansado. No sé porqué fue, quizás por haber pasado tantas noches en aquella discoteca, pero empezó a gustarme más y más salir de fiesta, finalmente, dejé mis estudios y empecé mi nueva vida, ahora salgo de fiesta todos los días de la semana.\n\n关键词：amigos（朋友们），familia（家庭）", "attempts": 2}, {"id": "M4_R_T3_Q16", "source": "A2_READING_FINAL", "level": "A2", "section": "a2_reading_m4_t3", "section_title": "A2 阅读 - Tiempo libre - Task 3", "module": "reading", "module_label": "阅读", "module_order": 4, "batch_label": "Tiempo libre", "batch_key": "A2::reading::Tiempo libre", "batch_order": 4, "prompt": "[A2 阅读 · Tiempo libre · Task 3]\n\n请回答选项字母（A/B/C...）或完整选项内容。\n\n阅读材料：\n[材料 1]\nA\n\n[材料 2]\nC\n\n[材料 3]\nB\n\n问题：\n¿Quién descubrió su pasión gracias a algo que otra persona le d el fin de semana. Los pases nocturnos tuvieron especial atractivo para los turistas, muchos de los cuales vinieron desde otras ciudades para disfrutar de los museos a oscuras.\n\n关键词：tiendas（商店），centro（市中心），museo（博物馆），historia（故事）", "attempts": 2}]}</script>
  <script>
    const STORAGE_KEY = "spanish_merged_site_progress_v4";

    const state = {
      data: [],
      meta: null,
      filtered: [],
      queue: [],
      cursor: 0,
      current: null,
      progress: {
        stats: { answered: 0, correct: 0, wrong: 0 },
        perQuestion: {},
        missedIds: []
      }
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, function (c) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[c];
      });
    }

    function normalizeText(s) {
      return String(s || "")
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "")
        .replace(/[¿¡]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            state.progress = parsed;
          }
        }
      } catch (e) {}

      if (!state.progress.stats) state.progress.stats = { answered: 0, correct: 0, wrong: 0 };
      if (!state.progress.perQuestion) state.progress.perQuestion = {};
      if (!Array.isArray(state.progress.missedIds)) state.progress.missedIds = [];
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress, null, 2));
      renderStats();
    }

    function isMissed(qid) {
      return (state.progress.missedIds || []).includes(qid);
    }

    function isMastered(qid) {
      const item = state.progress.perQuestion[qid];
      return !!(item && item.mastered);
    }

    function setSelectOptions(selectEl, items) {
      selectEl.innerHTML = "";
      items.forEach(function (item) {
        const option = document.createElement("option");
        option.value = item.key;
        option.textContent = item.label;
        selectEl.appendChild(option);
      });
    }

    function refreshModuleOptions() {
      const level = $("levelSelect").value;
      const moduleSelect = $("moduleSelect");

      if (level === "ALL") {
        setSelectOptions(moduleSelect, [{ key: "ALL", label: "全部" }]);
        return;
      }

      const items = state.meta.modules_by_level[level] || [{ key: "ALL", label: "全部" }];
      const oldValue = moduleSelect.value;
      setSelectOptions(moduleSelect, items);

      const allowed = new Set(items.map(x => x.key));
      moduleSelect.value = allowed.has(oldValue) ? oldValue : "ALL";
    }

    function refreshBatchOptions() {
      const level = $("levelSelect").value;
      const moduleKey = $("moduleSelect").value;
      const batchSelect = $("batchSelect");

      if (level === "ALL" || moduleKey === "ALL") {
        setSelectOptions(batchSelect, [{ key: "ALL", label: "全部" }]);
        batchSelect.value = "ALL";
        return;
      }

      const items = state.meta.batches_by_level_module[level + "::" + moduleKey] || [{ key: "ALL", label: "全部" }];
      const oldValue = batchSelect.value;
      setSelectOptions(batchSelect, items);

      const allowed = new Set(items.map(x => x.key));
      batchSelect.value = allowed.has(oldValue) ? oldValue : "ALL";
    }

    function getScopePool() {
      const level = $("levelSelect").value;
      const moduleKey = $("moduleSelect").value;
      const batchKey = $("batchSelect").value;

      let arr = state.data.slice();

      if (level !== "ALL") {
        arr = arr.filter(q => q.level === level);
      }

      if (moduleKey !== "ALL") {
        arr = arr.filter(q => q.module === moduleKey);
      }

      if (batchKey !== "ALL") {
        arr = arr.filter(q => q.batch_key === batchKey);
      }

      return arr;
    }

    function applyFilters() {
      let arr = getScopePool();
      const masteryMode = $("masteryModeSelect").value;

      if (masteryMode === "active") {
        arr = arr.filter(q => !isMastered(q.id));
      } else if (masteryMode === "missed") {
        arr = arr.filter(q => isMissed(q.id));
      }

      arr.sort((a, b) => {
        if (a.level !== b.level) return a.level.localeCompare(b.level, "en");
        if (a.module_order !== b.module_order) return a.module_order - b.module_order;
        if (a.batch_order !== b.batch_order) return a.batch_order - b.batch_order;
        return a.id.localeCompare(b.id, "en");
      });

      state.filtered = arr;
      state.queue = arr.slice();
      state.cursor = 0;

      $("poolInfo").textContent =
        "当前筛选后共有 " + arr.length + " 题。默认模式下，答对的题会自动退出当前题池。";

      renderStats();
      nextQuestion(true);
    }

    function renderStats() {
      $("poolCount").textContent = String(state.filtered.length || 0);
      $("answeredCount").textContent = String(state.progress.stats.answered || 0);

      const answered = state.progress.stats.answered || 0;
      const correct = state.progress.stats.correct || 0;
      $("accuracy").textContent = answered ? Math.round((correct / answered) * 100) + "%" : "0%";

      $("missedCount").textContent = String((state.progress.missedIds || []).length);
    }

    function markMissed(questionId, isMissedFlag) {
      const set = new Set(state.progress.missedIds || []);
      if (isMissedFlag) set.add(questionId);
      else set.delete(questionId);
      state.progress.missedIds = Array.from(set);
    }

    function renderQuestion(q) {
      state.current = q;

      $("questionMeta").innerHTML =
        '<span class="tag">' + escapeHtml(q.level) + '</span>' +
        '<span class="tag">' + escapeHtml(q.module_label) + '</span>' +
        '<span class="tag">' + escapeHtml(q.batch_label) + '</span>' +
        '<span class="tag">' + escapeHtml(q.section_title) + '</span>' +
        '<span class="tag">ID: ' + escapeHtml(q.id) + '</span>';

      $("prompt").textContent = q.prompt;
      $("answerInput").value = "";
      $("feedback").className = "feedback";
      $("feedback").style.display = "none";
      $("feedback").textContent = "";
      $("answerInput").focus();
    }

    function nextQuestion(forceFirst) {
      if (!state.queue.length) {
        $("questionMeta").innerHTML = "";
        $("prompt").textContent = "当前筛选下没有题。你可以切换板块、Batch，或者点“重新开始当前范围”。";
        $("feedback").className = "feedback";
        $("feedback").style.display = "none";
        $("feedback").textContent = "";
        return;
      }

      if (forceFirst) state.cursor = 0;
      if (state.cursor >= state.queue.length) state.cursor = 0;

      renderQuestion(state.queue[state.cursor]);
      state.cursor += 1;
    }

    function showFeedback(kind, text) {
      const el = $("feedback");
      el.className = "feedback " + kind;
      el.style.display = "block";
      el.textContent = text;
    }

    function removeCurrentFromPoolIfNeeded(qid) {
      const masteryMode = $("masteryModeSelect").value;
      if (masteryMode === "all") return;

      state.filtered = state.filtered.filter(q => q.id !== qid);
      state.queue = state.queue.filter(q => q.id !== qid);
      if (state.cursor > state.queue.length) state.cursor = state.queue.length;
      renderStats();
    }

    function submitAnswer() {
      const q = state.current;
      if (!q) return;

      const userRaw = $("answerInput").value;
      const user = normalizeText(userRaw);
      const answers = (q.answers || []).map(normalizeText).filter(Boolean);
      const ok = answers.includes(user);

      state.progress.stats.answered += 1;

      if (!state.progress.perQuestion[q.id]) {
        state.progress.perQuestion[q.id] = {
          attempts: 0,
          correct: 0,
          wrong: 0,
          lastUserAnswer: "",
          mastered: false
        };
      }

      const item = state.progress.perQuestion[q.id];
      item.attempts += 1;
      item.lastUserAnswer = userRaw;

      if (ok) {
        state.progress.stats.correct += 1;
        item.correct += 1;
        item.mastered = true;
        markMissed(q.id, false);

        const msg = ["答对了。", "", "标准答案："].concat(q.answers || []);
        if (q.explanation) {
          msg.push("", "解释：", q.explanation);
        }

        showFeedback("ok", msg.join("
"));
        saveProgress();
        removeCurrentFromPoolIfNeeded(q.id);

        if ($("autoNext").checked) {
          setTimeout(function () { nextQuestion(false); }, 450);
        }
      } else {
        state.progress.stats.wrong += 1;
        item.wrong += 1;
        item.mastered = false;
        markMissed(q.id, true);

        const msg = [
          "这题错了。",
          "",
          "你的答案：" + (userRaw || "(空白)"),
          "",
          "标准答案："
        ].concat(q.answers || []);

        if (q.explanation) {
          msg.push("", "解释：", q.explanation);
        }

        showFeedback("bad", msg.join("
"));
        saveProgress();
      }
    }

    function revealAnswer() {
      const q = state.current;
      if (!q) return;

      const msg = ["标准答案："].concat(q.answers || []);
      if (q.explanation) {
        msg.push("", "解释：", q.explanation);
      }

      showFeedback("info", msg.join("
"));
    }

    function resetFilters() {
      $("levelSelect").value = "ALL";
      refreshModuleOptions();
      refreshBatchOptions();
      $("masteryModeSelect").value = "active";
      $("autoNext").checked = false;
      applyFilters();
    }

    function exportProgress() {
      const blob = new Blob([JSON.stringify(state.progress, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "spanish_merged_progress.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importProgress(file) {
      const reader = new FileReader();
      reader.onload = function () {
        try {
          const parsed = JSON.parse(reader.result);
          state.progress = parsed;
          saveProgress();
          applyFilters();
        } catch (e) {
          alert("导入失败：这不是有效的 JSON 进度文件。");
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function resetCurrentScope() {
      const scope = getScopePool();
      if (!scope.length) {
        alert("当前范围里没有题可重置。");
        return;
      }

      const ok = confirm("确定要把“当前筛选范围”里的题重置成可重做吗？");
      if (!ok) return;

      const ids = new Set(scope.map(q => q.id));
      const nextPer = {};

      Object.keys(state.progress.perQuestion || {}).forEach(function (qid) {
        if (!ids.has(qid)) {
          nextPer[qid] = state.progress.perQuestion[qid];
        }
      });

      state.progress.perQuestion = nextPer;
      state.progress.missedIds = (state.progress.missedIds || []).filter(qid => !ids.has(qid));
      saveProgress();
      applyFilters();
    }

    function resetAllProgress() {
      const ok = confirm("确定要清空全部进度和错题吗？");
      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);
      state.progress = {
        stats: { answered: 0, correct: 0, wrong: 0 },
        perQuestion: {},
        missedIds: []
      };
      saveProgress();
      applyFilters();
    }

    function init() {
      loadProgress();

      let payload;
      try {
        payload = JSON.parse(document.getElementById("quiz-data").textContent);
      } catch (e) {
        document.getElementById("prompt").textContent = "载入失败。内嵌 JSON 解析出错。";
        console.error(e);
        return;
      }

      state.data = payload.questions;
      state.meta = payload.meta;

      refreshModuleOptions();
      refreshBatchOptions();

      $("poolInfo").textContent =
        "总题数 " + payload.meta.total_questions +
        "。A1: " + payload.meta.a1_questions +
        "，A2: " + payload.meta.a2_questions + "。";

      renderStats();
      applyFilters();

      $("levelSelect").addEventListener("change", function () {
        refreshModuleOptions();
        refreshBatchOptions();
        applyFilters();
      });

      $("moduleSelect").addEventListener("change", function () {
        refreshBatchOptions();
        applyFilters();
      });

      $("batchSelect").addEventListener("change", applyFilters);
      $("masteryModeSelect").addEventListener("change", applyFilters);

      $("applyBtn").addEventListener("click", applyFilters);
      $("resetFilterBtn").addEventListener("click", resetFilters);
      $("resetCurrentScopeBtn").addEventListener("click", resetCurrentScope);

      $("submitBtn").addEventListener("click", submitAnswer);
      $("showBtn").addEventListener("click", revealAnswer);
      $("nextBtn").addEventListener("click", function () { nextQuestion(false); });

      $("exportBtn").addEventListener("click", exportProgress);
      $("importBtn").addEventListener("click", function () { $("importFile").click(); });
      $("importFile").addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (file) importProgress(file);
        e.target.value = "";
      });

      $("resetProgressBtn").addEventListener("click", resetAllProgress);

      $("answerInput").addEventListener("keydown", function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          submitAnswer();
        }
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  </script>

  <script src="./spanish_rescue_patch.js"></script>
